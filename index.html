<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaflet Map Tracker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="http//:127.0.0.1:5500" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard-container">
        <!-- Left Section: Map -->
        <div class="map-section glass-card">
            <div class="header-ui">
                <h1>Map Tracker</h1>
                <button type="submit" id="refresh_btn" class="refresh_btn">Refresh Status</button>
            </div>
            <div class="map-wrapper">
                <div id="map"></div>
            </div>
        </div>

        <!-- Right Section: Controls -->
        <div class="control-section">
            <!-- Set Alarm Card -->
            <div class="glass-card">
                <h2>Set Alert</h2>
                <form id="alarm_form" class="alarm_form">
                    <div>
                        <span class="label-title">Alert Distance (units)</span>
                        <input type="number" step="0.01" name="alert distance" id="alert_distance" placeholder="Enter distance threshold...">
                    </div>
                    <div>
                        <span class="label-title">Target Device</span>
                        <select name="user_list" class="user_list" id="user_list"></select>
                    </div>
                    <button type="submit">Set Alarm</button>
                </form>
            </div>

            <!-- Active Alarms Card -->
            <div class="glass-card alarm-list-container">
                <h2>Active Alarms</h2>
                <span class="label-title" style="margin-bottom: 12px;">Trigger Thresholds</span>
                <ul class="alarm_list" name="alarm_list" id="alarm_list"></ul>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin="http//:127.0.0.1:5500"></script>
    <script src="https://unpkg.com/leaflet.marker.slideto@0.2.0/Leaflet.Marker.SlideTo.js"></script>
    <script src="app.js"></script>

</body>
</html>
